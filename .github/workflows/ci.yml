name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (iOS ${{ matrix.ios }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        ios: ["26.4"]
        device: ["iPhone 16 Pro"]
    env:
      XCODE_VERSION: "26.0"
      SCHEME: "CarCam Pro"
      PROJECT: "CarCam Pro.xcodeproj"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift packages
        run: xcodebuild -project "${{ env.PROJECT }}" -resolvePackageDependencies

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }},OS=${{ matrix.ios }}' \
            -configuration Debug \
            clean build \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }},OS=${{ matrix.ios }}' \
            -configuration Debug \
            -enableCodeCoverage YES \
            -resultBundlePath ./build/TestResults.xcresult \
            test \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload xcresult bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-ios-${{ matrix.ios }}
          path: ./build/TestResults.xcresult
          retention-days: 14

  lint:
    name: Lint (SwiftLint + SwiftFormat)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install linters
        run: |
          brew update
          brew install swiftlint swiftformat

      - name: SwiftLint
        run: swiftlint --strict --reporter github-actions-logging

      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .

  archive:
    name: Archive (Release, unsigned)
    runs-on: macos-15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-and-test, lint]
    env:
      XCODE_VERSION: "26.0"
      SCHEME: "CarCam Pro"
      PROJECT: "CarCam Pro.xcodeproj"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -archivePath ./build/CarCamPro.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: CarCamPro-xcarchive
          path: ./build/CarCamPro.xcarchive
          retention-days: 14
