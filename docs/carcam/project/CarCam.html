<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CarCam — iOS dash cam</title>
<meta name="viewport" content="width=1440, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap">
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0d; color: #f2f3f5; font-family: "Inter Tight", system-ui, sans-serif; }
  .cc-canvas-override { background: #0a0a0d !important; }
  .cc-canvas-override > div { background-image: none !important; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>


<script type="text/babel" data-presets="react">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>
<script type="text/babel" data-presets="react">

// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// No assets, no deps.

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// ─────────────────────────────────────────────────────────────
// Main canvas — transform-based pan/zoom viewport
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DesignCanvas({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button starting on the
    // canvas background (not inside an artboard).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = e.target === vp || e.target === worldRef.current;
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div

<script type="text/babel" data-presets="react">
// CarCam design tokens + shared primitives
// Technical instrument-cluster aesthetic.

const CC = {
  // surfaces — iOS 26 dark
  void: '#000000',
  bg: '#1C1C1E',
  panel: '#2C2C2E',
  panelHi: '#3A3A3C',
  rule: 'rgba(84,84,88,0.65)',
  ruleHi: 'rgba(84,84,88,0.95)',

  // text — iOS label hierarchy (dark)
  ink: '#FFFFFF',
  ink2: 'rgba(235,235,245,0.78)',
  ink3: 'rgba(235,235,245,0.60)',
  ink4: 'rgba(235,235,245,0.38)',

  // iOS system signal colors (dark)
  amber: '#FF9F0A',
  amberDim: '#C77600',
  cyan: '#64D2FF',
  cyanDim: '#3DA5CC',
  red: '#FF453A',
  green: '#30D158',
  blue: '#0A84FF',

  // type — SF Pro (iOS system)
  sans: '-apple-system, "SF Pro Text", "SF Pro", BlinkMacSystemFont, "Helvetica Neue", sans-serif',
  sansDisplay: '-apple-system, "SF Pro Display", "SF Pro", BlinkMacSystemFont, "Helvetica Neue", sans-serif',
  mono: 'ui-monospace, "SF Mono", Menlo, Monaco, monospace',
};

// ─── Small caps label ─────────────────────────────────────────
function CCLabel({ children, color = CC.ink3, size = 10, style = {} }) {
  return (
    <div style={{
      fontFamily: CC.mono, fontSize: size, letterSpacing: '0.18em',
      textTransform: 'uppercase', color, fontWeight: 500,

    }}>{children}</div>
  );
}

// ─── Mono numeric readout ─────────────────────────────────────
function CCNum({ value, unit, size = 48, color = CC.ink, unitColor = CC.ink3, weight = 300, style = {} }) {
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, fontFamily: CC.mono, ...style }}>
      <span style={{
        fontSize: size, color, fontWeight: weight,
        fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.02em', lineHeight: 1,
      }}>{value}</span>
      {unit && (
        <span style={{
          fontSize: Math.max(10, size * 0.22), color: unitColor,
          letterSpacing: '0.16em', textTransform: 'uppercase',
        }}>{unit}</span>
      )}
    </div>
  );
}

// ─── Tick marks (horizontal scale) ───────────────────────────
function CCTicks({ count = 20, major = 5, height = 14, color = CC.ink4, majorColor = CC.ink3 }) {
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 0, height, width: '100%' }}>
      {Array.from({ length: count }).map((_, i) => {
        const isMajor = i % major === 0;
        return (
          <div key={i} style={{
            flex: 1, height: isMajor ? height : height * 0.5,
            borderLeft: `1px solid ${isMajor ? majorColor : color}`,
          }} />
        );
      })}
    </div>
  );
}

// ─── Circular gauge (for speed, G-force, etc.) ───────────────
function CCGauge({ value = 0, max = 100, size = 180, label, unit, sublabel, color = CC.amber, startAngle = 135, sweep = 270 }) {
  const r = size / 2 - 8;
  const cx = size / 2, cy = size / 2;
  const pct = Math.max(0, Math.min(1, value / max));

  // arc path
  const polar = (a) => {
    const rad = (a - 90) * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  };
  const arcPath = (fromA, toA) => {
    const [x1, y1] = polar(fromA);
    const [x2, y2] = polar(toA);
    const large = Math.abs(toA - fromA) > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
  };

  // ticks
  const tickCount = 41;
  const ticks = Array.from({ length: tickCount }).map((_, i) => {
    const a = startAngle + (sweep * i) / (tickCount - 1);
    const [x1, y1] = polar(a);
    const rad = (a - 90) * Math.PI / 180;
    const isMajor = i % 5 === 0;
    const inner = r - (isMajor ? 10 : 5);
    const x2 = cx + inner * Math.cos(rad);
    const y2 = cy + inner * Math.sin(rad);
    const filled = i / (tickCount - 1) <= pct;
    return (
      <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
        stroke={filled ? color : CC.ink4}
        strokeWidth={isMajor ? 1.5 : 1}
        opacity={filled ? 1 : 0.6}
      />
    );
  });

  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ display: 'block' }}>
        {/* base track */}
        <path d={arcPath(startAngle, startAngle + sweep)} fill="none" stroke={CC.rule} strokeWidth={1} />
        {/* filled arc */}
        <path d={arcPath(startAngle, startAngle + sweep * pct)} fill="none" stroke={color} strokeWidth={2} strokeLinecap="butt" />
        {ticks}
      </svg>
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center', gap: 2,
      }}>
        {label && <CCLabel size={9}>{label}</CCLabel>}
        <CCNum value={value} unit={unit} size={size * 0.28} color={color} weight={200} />
        {sublabel && <CCLabel size={9} color={CC.ink4}>{sublabel}</CCLabel>}
      </div>
    </div>
  );
}

// ─── Live-feed placeholder (diagonal stripes) ────────────────
function CCFeedPlaceholder({ label = 'LIVE FEED', style = {}, children }) {

        }}>{label}</div>
      </div>
      {children}
    </div>
  );
}

// ─── Crosshair overlay (adds to any container) ───────────────
function CCCrosshair({ color = CC.ink4, size = 10 }) {
  return (
    <>
      {['0 0', 'auto 0', '0 auto', 'auto auto'].map((pos, i) => {
        const [v, h] = pos.split(' ');

          v === '0' ? 0 : 'auto', h === 'auto' ? 0 : 'auto',
          v === 'auto' ? 0 : 'auto', h === '0' ? 0 : 'auto',
        ];
        return (
          <div key={i} style={{
            position: 'absolute', top, right, bottom, left, width: size, height: size,
            borderTop: top === 0 ? `1px solid ${color}` : 'none',
            borderBottom: bottom === 0 ? `1px solid ${color}` : 'none',
            borderLeft: left === 0 ? `1px solid ${color}` : 'none',
            borderRight: right === 0 ? `1px solid ${color}` : 'none',
          }} />
        );
      })}
    </>
  );
}

// ─── CarCam status bar — dark, replaces IOSStatusBar for dark frames ───
function CCStatusBar({ time = '9:41', color = CC.ink }) {

// ─── Recording dot (pulsing) ─────────────────────────────────
function CCRecDot({ size = 8, color = CC.red }) {

// ─── Global keyframes + font imports ─────────────────────────
function CCGlobalStyles() {
  const css = `
      @keyframes cc-rec-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
      @keyframes cc-scan {

      body { background: ${CC.void}; }
      * { -webkit-font-smoothing: antialiased; }
    `;
  return <style dangerouslySetInnerHTML={{ __html: css }} />;
}

// ─── Liquid Glass surface — iOS 26 style ─────────────────────
function CCGlass({ children, radius = 20, tint = 'dark', style = {}, padding, strong = false }) {
  return (
    <div style={{
      position: 'relative', borderRadius: radius, overflow: 'hidden',
      padding, ...style,
    }}>
      {/* tint + blur layer */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: radius,
        backdropFilter: `blur(${strong ? 28 : 20}px) saturate(180%)`,
        WebkitBackdropFilter: `blur(${strong ? 28 : 20}px) saturate(180%)`,
        background: tint === 'dark'
          ? (strong ? 'rgba(28,28,30,0.55)' : 'rgba(120,120,128,0.24)')
          : 'rgba(255,255,255,0.22)',
      }} />
      {/* highlight/shine + hairline */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: radius,
        boxShadow: 'inset 1.5px 1.5px 1px rgba(255,255,255,0.18), inset -1px -1px 1px rgba(255,255,255,0.06)',
        border: '0.5px solid rgba(255,255,255,0.18)',
        pointerEvents: 'none',
      }} />
      <div style={{ position: 'relative', zIndex: 1 }}>{children}</div>
    </div>
  );
}

// ─── iOS-style filled / tinted / plain button ────────────────
function CCButton({ children, variant = 'filled', color, size = 'lg', onClick, style = {}, icon }) {
  const h = size === 'lg' ? 50 : size === 'md' ? 44 : 34;
  const fs = size === 'lg' ? 17 : size === 'md' ? 15 : 13;
  const accent = color || CC.amber;
  const base = {
    height: h, borderRadius: h / 2, border: 'none', cursor: 'pointer',
    fontFamily: CC.sans, fontSize: fs, fontWeight: 600, letterSpacing: -0.2,
    padding: `0 ${h * 0.45}px`,
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
    WebkitFontSmoothing: 'antialiased',
  };
  if (variant === 'filled') {
    return <button onClick={onClick} style={{ ...base, background: accent, color: '#000', ...style }}>{icon}{children}</button>;
  }
  if (variant === 'tinted') {
    return <button onClick={onClick} style={{ ...base, background: accent + '26', color: accent, ...style }}>{icon}{children}</button>;
  }
  if (variant === 'glass') {
    return (
      <button onClick={onClick} style={{ ...base, background: 'transparent', color: CC.ink, padding: 0, overflow: 'visible', ...style }}>
        <CCGlass radius={h/2} style={{ height: h, width: '100%' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, height: h, padding: `0 ${h * 0.45}px`, color: CC.ink, fontSize: fs, fontWeight: 600, letterSpacing: -0.2 }}>
            {icon}{children}
          </div>
        </CCGlass>
      </button>
    );
  }
  // plain
  return <button onClick={onClick} style={{ ...base, background: 'transparent', color: accent, ...style }}>{icon}{children}</button>;
}

          }}>{label}</span>
          {sublabel && <span style={{
            fontFamily: CC.mono, fontSize: 10, color: CC.ink4, letterSpacing: '0.1em',
          }}>— {sublabel}</span>}
        </div>
      )}
      <div style={{
        width: w, height: h, borderRadius: landscape ? 48 : 48,
        overflow: 'hidden', position: 'relative',
        background: CC.void,
        boxShadow: '0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08), inset 0 0 0 2px #000',
      }}>
        {/* Dynamic island — landscape places it on the left side after rotation */}
        {!landscape && (
          <div style={{
            position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
            width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
          }} />
        )}
        {landscape && (
          <div style={{
            position: 'absolute', left: 11, top: '50%', transform: 'translateY(-50%)',
            width: 37, height: 126, borderRadius: 24, background: '#000', zIndex: 50,
          }} />
        )}
        {/* Status bar overlay */}
        {!noNav && !landscape && (
          <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
            <CCStatusBar color={CC.ink} />
          </div>
        )}
        {/* Home indicator */}
        <div style={{
          position: 'absolute',
          ...(landscape
            ? { left: 8, top: 0, bottom: 0, width: 5, display: 'flex', alignItems: 'center' }
            : { bottom: 8, left: 0, right: 0, height: 5, display: 'flex', justifyContent: 'center' }
          ),
          zIndex: 60, pointerEvents: 'none',
        }}>
          <div style={{
            ...(landscape
              ? { width: 5, height: 139 }
              : { width: 139, height: 5 }),
            borderRadius: 100, background: 'rgba(255,255,255,0.7)',
          }} />
        </div>
        <div style={{ width: '100%', height: '100%' }}>{children}</div>
      </div>
    </div>
  );
}

// ─── Tweak panel ────────────────────────────────────
function TweakPanel({ state, setState, visible }) {
  if (!visible) return null;
  return (
    <div style={{
      position: 'fixed', right: 20, bottom: 20, zIndex: 1000,
      width: 280, background: CC.void, color: CC.ink,
      border: `1px solid ${CC.ruleHi}`,
      fontFamily: CC.sans,
      boxShadow: '0 20px 60px rgba(0,0,0,0.6)',
    }}>
      <div style={{
        padding: '12px 14px', borderBottom: `1px solid ${CC.rule}`,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <CCLabel size={10} color={CC.amber}>● TWEAKS</CCLabel>
        <CCLabel size={9} color={CC.ink4}>v4.2</CCLabel>
      </div>

      <div style={{ padding: 14 }}>
        <CCLabel size={9} color={CC.ink4} style={{ marginBottom: 8 }}>ACCENT HUE</CCLabel>
        <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
          {[
            { k: 'orange', c: '#FF9F0A' },
            { k: 'cyan', c: '#64D2FF' },
            { k: 'green', c: '#30D158' },
            { k: 'pink', c: '#FF375F' },
            { k: 'red', c: '#FF453A' },
          ].map(o => (
            <div key={o.k} onClick={() => setState({ accent: o.k })} style={{
              flex: 1, height: 26, cursor: 'pointer',
              background: o.c,
              border: state.accent === o.k ? `2px solid ${CC.ink}` : `1px solid ${CC.rule}`,
            }} />
          ))}
        </div>

        <CCLabel size={9} color={CC.ink4} style={{ marginBottom: 8 }}>HUD DENSITY</CCLabel>
        <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
          {['minimal', 'standard', 'full'].map(d => (
            <div key={d} onClick={() => setState({ hudDensity: d })} style={{
              flex: 1, padding: '8px 0', textAlign: 'center', cursor: 'pointer',
              fontFamily: CC.mono, fontSize: 9, letterSpacing: '0.15em',
              color: state.hudDensity === d ? CC.void : CC.ink3,
              background: state.hudDensity === d ? CC.amber : 'transparent',
              border: `1px solid ${state.hudDensity === d ? 'transparent' : CC.ruleHi}`,
              textTransform: 'uppercase',
            }}>{d}</div>
          ))}
        </div>

        <CCLabel size={9} color={CC.ink4} style={{ marginBottom: 8 }}>REC INDICATOR</CCLabel>
        <div style={{ display: 'flex', gap: 6 }}>
          {[
            { k: 'pulse-dot', n: 'PULSE' },
            { k: 'square', n: 'BLOCK' },
            { k: 'timecode', n: 'CODE' },
          ].map(o => (
            <div key={o.k} onClick={() => setState({ recIndicator: o.k })} style={{
              flex: 1, padding: '8px 0', textAlign: 'center', cursor: 'pointer',
              fontFamily: CC.mono, fontSize: 9, letterSpacing: '0.15em',
              color: state.recIndicator === o.k ? CC.void : CC.ink3,
              background: state.recIndicator === o.k ? CC.amber : 'transparent',
              border: `1px solid ${state.recIndicator === o.k ? 'transparent' : CC.ruleHi}`,
            }}>{o.n}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Main app ───────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      else if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Apply tweaks to CC token overrides (shallow runtime palette swap)
  React.useEffect(() => {
    const map = {
      orange: '#FF9F0A',
      cyan: '#64D2FF',
      green: '#30D158',
      pink: '#FF375F',
      red: '#FF453A',
    };
    CC.amber = map[tweaks.accent] || '#FF9F0A';
  }, [tweaks.accent]);

  const updateTweak = (partial) => {
    const next = { ...tweaks, ...partial };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: partial }, '*');
  };

  // Render count key tied to tweaks so all phones re-render
  const k = tweaks.accent + '|' + tweaks.hudDensity + '|' + tweaks.recIndicator;

  return (
    <>
      <CCGlobalStyles />
      <DesignCanvas>
        {/* Header block — Figma-style title */}
        <div style={{ padding: '0 60px 60px', maxWidth: 1400 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 20 }}>
            <svg width="36" height="36" viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="17" fill="none" stroke={CC.ink3} strokeWidth="1" />
              <circle cx="18" cy="18" r="13" fill="none" stroke={CC.amber} strokeWidth="1" />
              {[0, 60, 120, 180, 240, 300].map(a => (
                <line key={a} x1="18" y1="18"
                  x2={18 + 13 * Math.cos(a * Math.PI / 180)}
                  y2={18 + 13 * Math.sin(a * Math.PI / 180)}
                  stroke={CC.ruleHi} strokeWidth="0.8" />
              ))}
              <circle cx="18" cy="18" r="4" fill="none" stroke={CC.amber} strokeWidth="1" />
              <circle cx="18" cy="18" r="1" fill={CC.amber} />
            </svg>
            <div>
              <div style={{ fontFamily: CC.mono, fontSize: 10, color: CC.ink3, letterSpacing: '0.2em' }}>CARCAM · iOS · v4.2</div>
              <div style={{ fontFamily: CC.sans, fontSize: 36, fontWeight: 300, letterSpacing: '-0.02em', color: CC.ink, marginTop: 2 }}>
                A dash cam for your phone
              </div>
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, auto)', gap: 48, maxWidth: 900 }}>
            {[
              ['AESTHETIC', 'Instrument cluster'],
              ['TYPE', 'Inter Tight · JetBrains Mono'],
              ['PALETTE', 'Graphite · Amber · Cyan'],
              ['SCREENS', '9 artboards'],
            ].map(([k, v]) => (
              <div key={k}>
                <div style={{ fontFamily: CC.mono, fontSize: 9, color: CC.ink4, letterSpacing: '0.2em' }}>{k}</div>
                <div style={{ fontFamily: CC.sans, fontSize: 14, color: CC.ink, marginTop: 4 }}>{v}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Onboarding */}
        <DCSection title="Onboarding" subtitle="4 steps — welcome, permissions, calibration, system check.">
          <Phone key={'o1'+k} label="01 / Welcome"><Onboard01 /></Phone>
          <Phone key={'o2'+k} label="02 / Permissions"><Onboard02 /></Phone>
          <Phone key={'o3'+k} label="03 / Calibrate"><Onboard03 /></Phone>
          <Phone key={'o4'+k} label="04 / Ready"><Onboard04 /></Phone>
        </DCSection>

        {/* Dashboards — 3 variations */}
        <DCSection title="Dashboard" subtitle="Three directions. Same brand, different density and hierarchy.">
          <Phone key={'d1'+k} label="Dashboard A" sublabel="Cockpit / instrument cluster"><DashboardCockpit /></Phone>
          <Phone key={'d2'+k} label="Dashboard B" sublabel="Minimal telemetry — editorial"><DashboardMinimal /></Phone>
          <Phone key={'d3'+k} label="Dashboard C" sublabel="Map-forward with HUD"><DashboardMap /></Phone>
        </DCSection>

        {/* Live cam */}
        <DCSection title="Live cam" subtitle="Landscape orientation. Full-bleed feed with AR-style HUD overlay.">
          <Phone key={'l'+k} label="Live / Recording" sublabel="landscape — phone mounted on windshield" landscape noNav>
            <LiveCamView />
          </Phone>
        </DCSection>

        {/* Settings + Trips + Incident */}
        <DCSection title="System screens" subtitle="Settings, trip archive, locked-incident playback.">
          <Phone key={'s'+k} label="Settings"><SettingsScreen /></Phone>
          <Phone key={'t'+k} label="Trips"><TripsScreen /></Phone>
          <Phone key={'i'+k} label="Incident playback" sublabel="1.8g impact · auto-locked"><IncidentScreen /></Phone>
        </DCSection>

        {/* Design-system ribbon at the bottom */}
        <div style={{ padding: '0 60px 100px', maxWidth: 1400 }}>
          <DCSection title="Design system" subtitle="Foundations pulled from every screen.">
            <div style={{
              width: 1100, background: CC.void, border: `1px solid ${CC.ruleHi}`,
              padding: 28, color: CC.ink, fontFamily: CC.sans,
            }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 28 }}>
                {/* Color */}
                <div>
                  <CCLabel size={9} color={CC.ink4}>COLOR</CCLabel>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, marginTop: 10 }}>
                    {[
                      ['Void', CC.void, '#05070A'],
                      ['BG', CC.bg, '#0B0D11'],
                      ['Panel', CC.panelHi, '#161B22'],
                      ['Ink', CC.ink, '#F2F3F5'],
                      ['Accent', CC.amber, tweaks.accent],
                      ['Cyan', CC.cyan, '0.82·0.11·210'],
                      ['Green', CC.green, '0.78·0.14·150'],
                      ['Red', CC.red, '0.66·0.22·25'],
                    ].map(([n, c, code]) => (
                      <div key={n} style={{
                        border: `1px solid ${CC.rule}`, padding: '8px 10px',
                        display: 'flex', alignItems: 'center', gap: 10,
                      }}>
                        <div style={{ width: 16, height: 16, background: c }} />
                        <div>
                          <div style={{ fontSize: 11, color: CC.ink }}>{n}</div>
                          <div style={{ fontFamily: CC.mono, fontSize: 9, color: CC.ink4 }}>{code}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Type */}
                <div>
                  <CCLabel size={9} color={CC.ink4}>TYPE</CCLabel>
                  <div style={{ marginTop: 10 }}>
                    <div style={{ fontFamily: CC.sans, fontSize: 40, fontWeight: 300, letterSpacing: '-0.03em', lineHeight: 1 }}>
                      Display
                    </div>
                    <div style={{ fontFamily: CC.mono, fontSize: 10, color: CC.ink4, marginTop: 4 }}>Inter Tight · 300 · −0.03em</div>
                  </div>
                  <div style={{ marginTop: 18 }}>
                    <div style={{ fontFamily: CC.mono, fontSize: 24, fontWeight: 300, color: CC.amber, letterSpacing: '-0.02em' }}>
                      62<span style={{ fontSize: 11, color: CC.ink4, marginLeft: 4 }}>MPH</span>
                    </div>
                    <div style={{ fontFamily: CC.mono, fontSize: 10, color: CC.ink4, marginTop: 4 }}>JetBrains Mono · telemetry</div>
                  </div>
                  <div style={{ marginTop: 18 }}>
                    <CCLabel>VELOCITY · LIMIT</CCLabel>
                    <div style={{ fontFamily: CC.mono, fontSize: 10, color: CC.ink4, marginTop: 4 }}>Label · mono · 0.18em tracked</div>
                  </div>
                </div>

                {/* Components */}
                <div>
                  <CCLabel size={9} color={CC.ink4}>COMPONENTS</CCLabel>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 14, marginTop: 10 }}>
                    <CCGauge value={62} max={120} size={120} label="SPEED" unit="MPH" />
                    <div style={{ display: 'flex', gap: 10 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '6px 10px', border: `1px solid ${CC.red}` }}>
                        <CCRecDot /> <CCLabel color={CC.red}>REC</CCLabel>
                      </div>
                      <div style={{ padding: '6px 10px', border: `1px solid ${CC.amber}`, color: CC.amber, fontFamily: CC.mono, fontSize: 10, letterSpacing: '0.2em' }}>LOCK</div>
                    </div>
                    <CCTicks count={24} major={4} height={14} />
                  </div>
                </div>
              </div>
            </div>
          </DCSection>
        </div>
      </DesignCanvas>

      <TweakPanel state={tweaks} setState={updateTweak} visible={editMode} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
