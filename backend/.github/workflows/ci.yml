name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'

defaults:
  run:
    working-directory: backend

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: carcam
          POSTGRES_PASSWORD: carcam
          POSTGRES_DB: carcam_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U carcam"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=12

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=12

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://carcam:carcam@localhost:5432/carcam_ci?schema=public
      REDIS_URL: redis://localhost:6379/0
      JWT_ACCESS_SECRET: test_secret_must_be_at_least_32_bytes_long_for_ci
      JWT_ISSUER: https://ci.carcampro.app
      JWT_AUDIENCE: carcam-ios-ci
      APPLE_APP_BUNDLE_ID: Res.CarCam-Pro
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: auto
      S3_BUCKET_CLIPS: carcam-clips
      S3_BUCKET_THUMBS: carcam-thumbs
      S3_BUCKET_REPORTS: carcam-reports
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio123

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Prisma generate + migrate
        run: |
          pnpm prisma:generate
          pnpm prisma:deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 14

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/docker/Dockerfile
          push: false
          tags: carcam-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
