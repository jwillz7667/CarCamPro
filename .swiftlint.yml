# CarCam Pro — SwiftLint configuration.
# Project style mirrors the CLAUDE.md conventions: Swift 6 concurrency,
# modern SwiftUI patterns, `guard` for early returns, bool-as-question naming.

# ───── paths ─────────────────────────────────────────────────────────────
included:
  - CarCam Pro
  - CarCam ProTests

excluded:
  - build
  - DerivedData
  - .build
  - docs
  - "**/*.generated.swift"

# ───── disabled defaults ─────────────────────────────────────────────────
# Rules we deliberately opt out of.
disabled_rules:
  - trailing_comma                 # we prefer Dangling commas in multi-line collections
  - todo                           # TODO/FIXME allowed in non-prod branches
  - multiple_closures_with_trailing_closure
  - opening_brace                  # Xcode default style differs from SwiftLint's
  - line_length                    # handled by editorconfig + manual review

# ───── opt-in rules ──────────────────────────────────────────────────────
opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_assert
  - discouraged_object_literal
  - discouraged_optional_boolean
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - explicit_init
  - explicit_self
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - force_unwrapping
  - function_default_parameter_at_end
  - identical_operands
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# ───── thresholds ────────────────────────────────────────────────────────
file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

type_body_length:
  warning: 400
  error: 800

function_body_length:
  warning: 60
  error: 120

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 12
  error: 20

nesting:
  type_level: 3
  function_level: 5

# ───── identifier naming ─────────────────────────────────────────────────
identifier_name:
  excluded:
    - id
    - x
    - y
    - z
    - r
    - g
    - b
    - a
    - i
    - j
    - k
    - to
    - at
    - of
  min_length:
    warning: 2
    error: 1

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 60
    error: 100

# ───── custom rules ──────────────────────────────────────────────────────
custom_rules:
  no_print_statements:
    included: '.*\.swift'
    excluded: '.*Tests.*\.swift'
    name: "No `print()` in production code"
    regex: '(?<!\w)print\('
    match_kinds:
      - identifier
    message: "Use AppLogger (OSLog) instead of print()."
    severity: warning

  no_uikit_in_design_system:
    included: 'CarCam Pro/Shared/DesignSystem/.*\.swift'
    name: "Design system must be SwiftUI-only"
    regex: 'import UIKit'
    message: "Design system primitives should not import UIKit."
    severity: warning

reporter: "xcode"
